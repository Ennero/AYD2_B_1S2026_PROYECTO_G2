services:
  # ==========================================================================
  # Database — PostgreSQL 15
  # ==========================================================================
  db:
    image: postgres:15-alpine
    container_name: logitrans_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logitrans_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logitrans_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logitrans_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================================================
  # Message Broker — RabbitMQ 3 (con Management UI en :15672)
  # ==========================================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: logitrans_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672  (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - logitrans_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==========================================================================
  # Backend — NestJS
  # ==========================================================================
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: logitrans_server
    ports:
      - "3006:3000"
    env_file:
      - server/.env
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: logitrans_db
      DB_AUTO_SEED: "true"
      DB_RESET_ON_BOOT: "false"
      JWT_SECRET: your_jwt_secret_key_here
      PORT: 3000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - logitrans_network

  # ==========================================================================
  # Frontend — Next.js
  # ==========================================================================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3006
    container_name: logitrans_client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3006
    depends_on:
      - server
    networks:
      - logitrans_network

networks:
  logitrans_network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
