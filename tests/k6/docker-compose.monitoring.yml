# LogiTrans — k6 Monitoring Stack
#
# Spins up InfluxDB + Grafana so k6 can stream metrics in real time.
#
# Usage:
#   1. Start monitoring stack:
#        docker compose -f tests/k6/docker-compose.monitoring.yml up -d
#
#   2. Run load tests with InfluxDB output:
#        k6 run --out influxdb=http://localhost:8086/k6 tests/k6/load/api.load.js
#
#   3. Run stress tests with InfluxDB output:
#        k6 run --out influxdb=http://localhost:8086/k6 tests/k6/stress/api.stress.js
#
#   4. Open Grafana dashboard:
#        http://localhost:3030  (admin / logitrans)
#        Dashboard: "k6 Load Testing Results"
#
#   5. Stop when done:
#        docker compose -f tests/k6/docker-compose.monitoring.yml down -v

services:
  # InfluxDB 1.8 — receives k6 metrics via --out influxdb
  influxdb:
    image: influxdb:1.8-alpine
    container_name: logitrans_k6_influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: logitrans
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - influxdb_data:/var/lib/influxdb

  # Grafana — visualises InfluxDB metrics with pre-provisioned k6 dashboard
  grafana:
    image: grafana/grafana:10.4.0
    container_name: logitrans_k6_grafana
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: logitrans
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb

volumes:
  influxdb_data:
  grafana_data:
