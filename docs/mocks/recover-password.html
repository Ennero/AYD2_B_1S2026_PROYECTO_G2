<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGITRANS - Recuperar Contraseña</title>
    <!-- Tailwind CSS para estilos rápidos y responsivos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fuentes de Google similares a la imagen -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-bg': '#5da991',
                        'brand-bg-dark': '#3a7a6c',
                        'brand-modal': '#164f51',
                        'brand-input': '#f7f5ea',
                        'brand-btn': '#6bc2af',
                        'brand-btn-hover': '#559b8b',
                    },
                    fontFamily: {
                        'title': ['Fredoka', 'sans-serif'],
                        'serif': ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Fondo similar al paisaje verde */
        body {
            background: linear-gradient(135deg, #73b8a5 0%, #357a62 100%);
            background-size: cover;
            background-attachment: fixed;
        }
        
        /* Ocultar elementos */
        .hidden-step {
            display: none;
        }

        /* Animación suave al cambiar de vista */
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilo para las alertas personalizadas */
        #custom-alert {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Mensaje de alerta flotante -->
    <div id="custom-alert" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-white text-brand-modal px-6 py-3 rounded-lg shadow-lg opacity-0 pointer-events-none z-50 font-bold">
        Mensaje
    </div>

    <!-- Contenedor Principal (Caja oscura) -->
    <div class="bg-brand-modal w-full max-w-md p-10 shadow-2xl relative overflow-hidden">
        
        <!-- Título -->
        <h1 class="font-title text-white text-5xl text-center tracking-widest mb-10">LOGITRANS</h1>

        <!-- ==========================================
             PASO 1: SOLICITUD DE TOKEN
             ========================================== -->
        <div id="step-1" class="fade-in">
            <h2 class="text-center text-[#a8c9c9] mb-6 font-serif text-lg italic">Recuperación de cuenta</h2>
            
            <!-- Correo -->
            <div class="mb-2">
                <label class="block text-white font-serif text-lg mb-2 ml-4">Correo</label>
                <input type="email" id="email" placeholder="ejemplo@gmail.com" class="w-full px-5 py-3 rounded-full bg-brand-input text-gray-800 outline-none focus:ring-4 focus:ring-brand-btn/50 transition-all">
            </div>

            <!-- Botón Enviar Token -->
            <div class="flex justify-end mb-6">
                <button type="button" onclick="enviarToken()" class="text-sm text-brand-btn hover:text-white transition-colors underline decoration-brand-btn hover:decoration-white underline-offset-4">
                    Enviar token único
                </button>
            </div>

            <!-- Divisor -->
            <div class="w-full h-px bg-white/20 mb-6"></div>

            <!-- Token -->
            <div class="mb-8">
                <label class="block text-white font-serif text-lg mb-2 ml-4">Token recibido</label>
                <input type="text" id="token" placeholder="Ej. 123456" class="w-full px-5 py-3 rounded-full bg-brand-input text-gray-800 outline-none focus:ring-4 focus:ring-brand-btn/50 transition-all text-center tracking-widest">
            </div>

            <!-- Botón Continuar -->
            <div class="flex justify-center">
                <button type="button" onclick="irPaso2()" class="bg-brand-btn hover:bg-brand-btn-hover text-[#0e3536] font-bold py-3 px-8 rounded-2xl transition-all transform hover:scale-105 shadow-md">
                    Validar Token
                </button>
            </div>
        </div>

        <!-- ==========================================
             PASO 2: NUEVA CONTRASEÑA
             ========================================== -->
        <div id="step-2" class="hidden-step fade-in">
            <h2 class="text-center text-[#a8c9c9] mb-6 font-serif text-lg italic">Crea tu nueva contraseña</h2>

            <!-- Nueva Contraseña -->
            <div class="mb-6">
                <label class="block text-white font-serif text-lg mb-2 ml-4">Nueva Contraseña</label>
                <input type="password" id="new-password" placeholder="********" class="w-full px-5 py-3 rounded-full bg-brand-input text-gray-800 outline-none focus:ring-4 focus:ring-brand-btn/50 transition-all">
            </div>

            <!-- Confirmar Contraseña -->
            <div class="mb-10">
                <label class="block text-white font-serif text-lg mb-2 ml-4">Confirmar Contraseña</label>
                <input type="password" id="confirm-password" placeholder="********" class="w-full px-5 py-3 rounded-full bg-brand-input text-gray-800 outline-none focus:ring-4 focus:ring-brand-btn/50 transition-all">
            </div>

            <!-- Botones Finales -->
            <div class="flex flex-col items-center gap-4">
                <button type="button" onclick="guardarContrasena()" class="bg-brand-btn hover:bg-brand-btn-hover text-[#0e3536] font-bold py-3 px-8 rounded-2xl transition-all transform hover:scale-105 shadow-md w-full max-w-[200px]">
                    Cambiar
                </button>
                <button type="button" onclick="volverPaso1()" class="text-sm text-[#a8c9c9] hover:text-white transition-colors">
                    ← Volver
                </button>
            </div>
        </div>

    </div>

    <script>
        // Función para mostrar mensajes estilo "Toast"
        function mostrarAlerta(mensaje) {
            const alerta = document.getElementById('custom-alert');
            alerta.textContent = mensaje;
            alerta.style.opacity = '1';
            
            setTimeout(() => {
                alerta.style.opacity = '0';
            }, 3000);
        }

        // Lógica de la interfaz
        function enviarToken() {
            const email = document.getElementById('email').value;
            if(!email) {
                mostrarAlerta('Por favor, ingresa tu correo primero.');
                return;
            }
            // Aquí iría la llamada al backend para enviar el correo
            mostrarAlerta('¡Token enviado a ' + email + '!');
        }

        function irPaso2() {
            // Simulamos la validación del token
            const token = document.getElementById('token').value;
            if(!token) {
                mostrarAlerta('Debes ingresar el token recibido.');
                return;
            }
            
            // Ocultar paso 1, mostrar paso 2
            document.getElementById('step-1').classList.add('hidden-step');
            document.getElementById('step-2').classList.remove('hidden-step');
        }

        function volverPaso1() {
            // Volver al inicio
            document.getElementById('step-2').classList.add('hidden-step');
            document.getElementById('step-1').classList.remove('hidden-step');
            
            // Limpiar campos del paso 2
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
        }

        function guardarContrasena() {
            const pass1 = document.getElementById('new-password').value;
            const pass2 = document.getElementById('confirm-password').value;

            if(!pass1 || !pass2) {
                mostrarAlerta('Por favor llena ambos campos.');
                return;
            }

            if(pass1 !== pass2) {
                mostrarAlerta('Las contraseñas no coinciden.');
                return;
            }

            // Aquí se enviaría la nueva contraseña al servidor
            mostrarAlerta('¡Contraseña actualizada con éxito!');
            
            // Simular redirección después de 2 segundos
            setTimeout(() => {
                volverPaso1();
                document.getElementById('email').value = '';
                document.getElementById('token').value = '';
            }, 2000);
        }
    </script>
</body>
</html>
