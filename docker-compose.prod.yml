# ============================================================================
# LogiTrans — Production Docker Compose
# ============================================================================
# Simula la topología on-premise definida en architecture.md:
#
#   Nodo Principal:
#     - Nginx (LB + SSL termination)
#     - api-1 / api-2  (NestJS, least-connections)
#     - client          (Next.js SPA)
#     - db              (PostgreSQL 15)
#     - redis           (session store)
#
# Uso:
#   ./scripts/deploy.sh          # despliegue completo automatizado
#   docker compose -f docker-compose.prod.yml up -d --build
# ============================================================================

services:

  # ==========================================================================
  # Base de Datos — PostgreSQL 15
  # ==========================================================================
  db:
    image: postgres:15-alpine
    container_name: logitrans_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB:       ${DB_DATABASE:-logitrans_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-logitrans_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==========================================================================
  # API — Instancia 1 (NestJS)
  # ==========================================================================
  api-1:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: logitrans_api_1
    restart: unless-stopped
    env_file:
      - server/.env.production
    environment:
      PORT:         3000
      NODE_ENV:     production
      DB_HOST:      db
      DB_PORT:      5432
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # API — Instancia 2 (NestJS) — failover / balanceo
  # ==========================================================================
  api-2:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: logitrans_api_2
    restart: unless-stopped
    env_file:
      - server/.env.production
    environment:
      PORT:         3000
      NODE_ENV:     production
      DB_HOST:      db
      DB_PORT:      5432
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # Frontend — Next.js
  # ==========================================================================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: logitrans_client
    restart: unless-stopped
    environment:
      NODE_ENV:               production
      NEXT_PUBLIC_API_URL:    ${NEXT_PUBLIC_API_URL:-https://localhost/api}
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # Nginx — Load Balancer + SSL Termination
  # ==========================================================================
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: logitrans_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certificates generated by scripts/deploy.sh → nginx/ssl/
      - ./nginx/ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      - ./nginx/ssl/key.pem:/etc/nginx/ssl/key.pem:ro
    networks:
      - frontend
      - backend
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
      client:
        condition: service_started

# ============================================================================
# Networks
# ============================================================================
networks:
  # Red interna: api instances ↔ db ↔ redis
  backend:
    driver: bridge
  # Red externa: nginx ↔ client ↔ api (sólo para proxying)
  frontend:
    driver: bridge

# ============================================================================
# Volumes (persistencia de datos)
# ============================================================================
volumes:
  postgres_data:
    driver: local
