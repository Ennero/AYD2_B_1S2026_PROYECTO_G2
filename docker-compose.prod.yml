# ============================================================================
# LogiTrans — Production Docker Compose
# ============================================================================
# Simula la topología on-premise definida en architecture.md:
#
#   Nodo Principal:
#     - Nginx (LB + SSL termination)
#     - api-1 / api-2  (NestJS, least-connections)
#     - client          (Next.js SPA)
#     - db-primary      (PostgreSQL 15 — escrituras + lectura general)
#     - db-replica      (PostgreSQL 15 — lectura GERENCIA, streaming replication)
#     - redis           (session store)
#
# Uso:
#   ./scripts/deploy.sh          # despliegue completo automatizado
#   docker compose -f docker-compose.prod.yml up -d --build
# ============================================================================

services:

  # ==========================================================================
  # Base de Datos Primaria — PostgreSQL 15 (escrituras + lectura general)
  # WAL habilitado para streaming replication hacia db-replica.
  # ==========================================================================
  db-primary:
    image: postgres:15-alpine
    container_name: logitrans_db_primary
    restart: unless-stopped
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=5
      -c max_replication_slots=5
      -c wal_keep_size=64
      -c hot_standby=on
    environment:
      POSTGRES_USER:                ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD:            ${DB_PASSWORD:-postgres}
      POSTGRES_DB:                  ${DB_DATABASE:-logitrans_db}
      DB_REPLICATION_USER:          ${DB_REPLICATION_USER:-replicator}
      DB_REPLICATION_PASSWORD:      ${DB_REPLICATION_PASSWORD:-replicator_pass}
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./db/init-replication.sh:/docker-entrypoint-initdb.d/init-replication.sh:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-logitrans_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==========================================================================
  # Base de Datos Réplica — PostgreSQL 15 (solo lectura — rol GERENCIA)
  # Se inicializa con pg_basebackup desde db-primary en el primer arranque.
  # ==========================================================================
  db-replica:
    image: postgres:15-alpine
    container_name: logitrans_db_replica
    restart: unless-stopped
    environment:
      POSTGRES_USER:                ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD:            ${DB_PASSWORD:-postgres}
      POSTGRES_DB:                  ${DB_DATABASE:-logitrans_db}
      PGPASSWORD:                   ${DB_REPLICATION_PASSWORD:-replicator_pass}
      DB_PRIMARY_HOST:              db-primary
      DB_PRIMARY_PORT:              5432
      DB_REPLICATION_USER:          ${DB_REPLICATION_USER:-replicator}
      DB_REPLICATION_PASSWORD:      ${DB_REPLICATION_PASSWORD:-replicator_pass}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./db/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh:ro
    networks:
      - backend
    depends_on:
      db-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-logitrans_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ==========================================================================
  # API — Instancia 1 (NestJS)
  # ==========================================================================
  api-1:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: logitrans_api_1
    restart: unless-stopped
    env_file:
      - server/.env.production
    environment:
      PORT:                   3000
      NODE_ENV:               production
      DB_HOST:                db-primary
      DB_PORT:                5432
      DB_USERNAME:            ${DB_USERNAME:-postgres}
      DB_PASSWORD:            ${DB_PASSWORD:-postgres}
      DB_DATABASE:            ${DB_DATABASE:-logitrans_db}
      DB_REPLICA_HOST:        db-replica
      DB_REPLICA_PORT:        5432
      DB_REPLICA_ENABLED:     "true"
    networks:
      - backend
    depends_on:
      db-primary:
        condition: service_healthy
      db-replica:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # API — Instancia 2 (NestJS) — failover / balanceo
  # ==========================================================================
  api-2:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: logitrans_api_2
    restart: unless-stopped
    env_file:
      - server/.env.production
    environment:
      PORT:                   3000
      NODE_ENV:               production
      DB_HOST:                db-primary
      DB_PORT:                5432
      DB_USERNAME:            ${DB_USERNAME:-postgres}
      DB_PASSWORD:            ${DB_PASSWORD:-postgres}
      DB_DATABASE:            ${DB_DATABASE:-logitrans_db}
      DB_REPLICA_HOST:        db-replica
      DB_REPLICA_PORT:        5432
      DB_REPLICA_ENABLED:     "true"
    networks:
      - backend
    depends_on:
      db-primary:
        condition: service_healthy
      db-replica:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # Frontend — Next.js
  # ==========================================================================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: logitrans_client
    restart: unless-stopped
    environment:
      NODE_ENV:               production
      NEXT_PUBLIC_API_URL:    ${NEXT_PUBLIC_API_URL:-https://localhost/api}
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # Nginx — Load Balancer + SSL Termination
  # ==========================================================================
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: logitrans_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certificates generated by scripts/deploy.sh → nginx/ssl/
      - ./nginx/ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      - ./nginx/ssl/key.pem:/etc/nginx/ssl/key.pem:ro
    networks:
      - frontend
      - backend
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
      client:
        condition: service_started

# ============================================================================
# Networks
# ============================================================================
networks:
  # Red interna: api instances ↔ db ↔ redis
  backend:
    driver: bridge
  # Red externa: nginx ↔ client ↔ api (sólo para proxying)
  frontend:
    driver: bridge

# ============================================================================
# Volumes (persistencia de datos)
# ============================================================================
volumes:
  postgres_primary_data:
    driver: local
  postgres_replica_data:
    driver: local
