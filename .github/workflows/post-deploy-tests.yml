name: Post-Deploy Tests

"on":
  # Manual trigger — run after any deploy to verify production
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment URL (e.g. https://guatechnology.com)"
        required: true
        type: string

  # Automatic trigger — runs after the main CI/CD pipeline completes on main
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    branches: [main]
    types: [completed]

jobs:
  # ─────────────────────────────────────────────
  # Playwright E2E — full browser flows against production
  # ─────────────────────────────────────────────
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # For workflow_run triggers, only run if the upstream pipeline succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        env:
          BASE_URL: ${{ github.event.inputs.environment || format('https://{0}', secrets.APP_DOMAIN) }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────
  # k6 Load Test — normal traffic (50 VU, ~7 min)
  # ─────────────────────────────────────────────
  k6-load:
    name: Load Test (k6)
    runs-on: ubuntu-latest
    needs: playwright
    if: >
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run load tests
        env:
          BASE_URL: ${{ github.event.inputs.environment || format('https://{0}', secrets.APP_DOMAIN) }}
        run: k6 run --env BASE_URL=$BASE_URL tests/k6/load/api.load.js

  # ─────────────────────────────────────────────
  # k6 Stress Test — extreme load (400 VU, ~13 min)
  # ─────────────────────────────────────────────
  k6-stress:
    name: Stress Test (k6)
    runs-on: ubuntu-latest
    needs: k6-load
    if: >
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run stress tests
        env:
          BASE_URL: ${{ github.event.inputs.environment || format('https://{0}', secrets.APP_DOMAIN) }}
        run: k6 run --env BASE_URL=$BASE_URL tests/k6/stress/api.stress.js
