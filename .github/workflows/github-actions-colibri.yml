name: CI/CD Pipeline

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION_SERVER: '22'
  NODE_VERSION_CLIENT: '20'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint — server (ESLint) + client (Next.js ESLint)
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (server)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Lint server
        working-directory: server
        run: npm run lint

      - name: Setup Node.js (client)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_CLIENT }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Lint client
        working-directory: client
        run: npm run lint

  # ─────────────────────────────────────────────
  # Job 2: Unit Tests — Jest (src/**/*.spec.ts), no DB
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run unit tests
        working-directory: server
        run: npm run test

  # ─────────────────────────────────────────────
  # Job 3: Integration Tests — Jest + SuperTest + real PostgreSQL
  # ─────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_test
          POSTGRES_DB: logitrans_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Database — points to the services container above
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres_test
      DB_DATABASE: logitrans_test
      DB_LOGGING: 'false'
      DB_AUTO_SEED: 'true'
      DB_RESET_ON_BOOT: 'false'
      NODE_ENV: test
      # App secrets — required for AppModule initialization
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run integration tests
        working-directory: server
        run: npm run test:integration

  # ─────────────────────────────────────────────
  # Job 4: Build — Docker images → ECR (main only)
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      server-image: ${{ steps.build-server.outputs.image }}
      client-image: ${{ steps.build-client.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build server — context MUST be root (.) because server/Dockerfile
      # copies from db/ which is a sibling of server/ at the root level
      - name: Build and push server image
        id: build-server
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY_SERVER }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f server/Dockerfile \
            -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$REPOSITORY:latest \
            .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest
          echo "image=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Build client — context is ./client (self-contained Dockerfile)
      # NEXT_PUBLIC_API_URL is baked into the Next.js bundle at build time
      - name: Build and push client image
        id: build-client
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY_CLIENT }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f client/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$REPOSITORY:latest \
            ./client
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest
          echo "image=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # Job 5: Deploy — rolling update on ECS Fargate (main only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── Server service ──────────────────────
      - name: Download server task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEF_SERVER }} \
            --query taskDefinition \
            > /tmp/server-task-def.json

      - name: Render new server task definition
        id: server-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/server-task-def.json
          container-name: logitrans-server
          image: ${{ needs.build.outputs.server-image }}

      - name: Deploy server to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.server-task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_SERVER }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── Client service ──────────────────────
      - name: Download client task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEF_CLIENT }} \
            --query taskDefinition \
            > /tmp/client-task-def.json

      - name: Render new client task definition
        id: client-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/client-task-def.json
          container-name: logitrans-client
          image: ${{ needs.build.outputs.client-image }}

      - name: Deploy client to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.client-task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_CLIENT }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
