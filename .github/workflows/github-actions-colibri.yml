name: Build & Test

# ─── Trigger: únicamente en PRs de develop → main ────────────────────────────
on:
  pull_request:
    branches: [main]

env:
  NODE_VERSION_SERVER: '22'
  NODE_VERSION_CLIENT: '20'

jobs:
# ══════════════════════════════════════════════════════════════════════════════
# STAGE BUILD
# Lint + compilación de server y client en paralelo.
# Si cualquiera falla, el PR no puede avanzar a Test.
# ══════════════════════════════════════════════════════════════════════════════

  # ─── Build Server (NestJS) ──────────────────────────────────────────────────
  build-server:
    name: "Build · Server"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Lint
        working-directory: server
        run: npm run lint

      - name: Build (nest build)
        working-directory: server
        run: npm run build

  # ─── Build Client (Next.js) ─────────────────────────────────────────────────
  build-client:
    name: "Build · Client"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_CLIENT }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: Build (next build)
        working-directory: client
        env:
          # Requerido en compile-time por Next.js para inyectar en el bundle
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

# ══════════════════════════════════════════════════════════════════════════════
# STAGE TEST
# Unit tests primero (sin DB), luego integration tests (con PostgreSQL real).
# Ambos necesitan que el build de server haya pasado.
# ══════════════════════════════════════════════════════════════════════════════

  # ─── Unit Tests ─────────────────────────────────────────────────────────────
  test-unit:
    name: "Test · Unit"
    runs-on: ubuntu-latest
    needs: [build-server, build-client]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run unit tests
        working-directory: server
        run: npm run test

  # ─── Integration Tests (PostgreSQL real) ────────────────────────────────────
  test-integration:
    name: "Test · Integration"
    runs-on: ubuntu-latest
    needs: test-unit

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_test
          POSTGRES_DB: logitrans_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres_test
      DB_DATABASE: logitrans_test
      DB_LOGGING: 'false'
      DB_AUTO_SEED: 'true'
      DB_RESET_ON_BOOT: 'false'
      NODE_ENV: test
      MOCK_SMTP: 'true'
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run integration tests
        working-directory: server
        run: npm run test:integration

# ══════════════════════════════════════════════════════════════════════════════
# STAGE E2E
# Stack completo via Docker Compose (db + rabbitmq + server + client).
# continue-on-error: true → los fallos quedan visibles en el log pero NO
# bloquean el PR ni la fusión.
# ══════════════════════════════════════════════════════════════════════════════

  # ─── E2E Tests (Playwright) ─────────────────────────────────────────────────
  test-e2e:
    name: "Test · E2E (Playwright)"
    runs-on: ubuntu-latest
    needs: [build-server, build-client]
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      # Crear server/.env mínimo para que docker compose no falle al leer env_file
      - name: Create server/.env
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          {
            echo "JWT_SECRET=$JWT_SECRET"
            echo "RESEND_API_KEY=$RESEND_API_KEY"
            echo "SUPABASE_URL=$SUPABASE_URL"
            echo "SUPABASE_SERVICE_KEY=$SUPABASE_SERVICE_KEY"
            echo "MOCK_SMTP=true"
          } > server/.env

      # Levantar stack completo y esperar que todos los servicios estén listos
      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for backend health
        run: |
          echo "Waiting for backend (http://localhost:3006/health)..."
          for i in $(seq 1 36); do
            if curl -sf http://localhost:3006/health > /dev/null 2>&1; then
              echo "Backend ready after $((i * 5))s"
              break
            fi
            echo "  attempt $i/36..."
            sleep 5
          done

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend (http://localhost:3000)..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend ready after $((i * 5))s"
              break
            fi
            echo "  attempt $i/24..."
            sleep 5
          done

      # Instalar dependencias y browsers de Playwright
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_CLIENT }}
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      # Correr tests — el reporter 'list' imprime cada test en el log en tiempo real
      - name: Run E2E tests
        working-directory: e2e
        env:
          CI: 'true'
          BASE_URL: 'http://localhost:3000'
          API_URL: 'http://localhost:3006'
        run: npm test -- --reporter=list

      # Subir reporte HTML como artefacto (siempre, incluso si los tests fallan)
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      # Mostrar logs del stack si algo salió mal
      - name: Show stack logs on failure
        if: failure()
        run: |
          echo "=== server logs ==="
          docker compose logs --no-color server | tail -n 100
          echo "=== client logs ==="
          docker compose logs --no-color client | tail -n 50

      - name: Tear down stack
        if: always()
        run: docker compose down -v
