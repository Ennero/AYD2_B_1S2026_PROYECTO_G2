name: Build & Test

# ─── Trigger: únicamente en PRs hacia develop ─────────────────────────────────
on:
  pull_request:
    branches: [develop]

env:
  NODE_VERSION_SERVER: '22'
  NODE_VERSION_CLIENT: '20'

jobs:
# ══════════════════════════════════════════════════════════════════════════════
# STAGE BUILD
# Lint + compilación de server y client en paralelo.
# Si cualquiera falla, el PR no puede avanzar a Test.
# ══════════════════════════════════════════════════════════════════════════════

  # ─── Build Server (NestJS) ──────────────────────────────────────────────────
  build-server:
    name: "Build · Server"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Lint
        working-directory: server
        run: npm run lint

      - name: Build (nest build)
        working-directory: server
        run: npm run build

  # ─── Build Client (Next.js) ─────────────────────────────────────────────────
  build-client:
    name: "Build · Client"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_CLIENT }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: Build (next build)
        working-directory: client
        env:
          # Requerido en compile-time por Next.js para inyectar en el bundle
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

# ══════════════════════════════════════════════════════════════════════════════
# STAGE TEST
# Unit tests primero (sin DB), luego integration tests (con PostgreSQL real).
# Ambos necesitan que el build de server haya pasado.
# ══════════════════════════════════════════════════════════════════════════════

  # ─── Unit Tests ─────────────────────────────────────────────────────────────
  test-unit:
    name: "Test · Unit"
    runs-on: ubuntu-latest
    needs: [build-server, build-client]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run unit tests
        working-directory: server
        run: npm run test

  # ─── Integration Tests (PostgreSQL real) ────────────────────────────────────
  test-integration:
    name: "Test · Integration"
    runs-on: ubuntu-latest
    needs: test-unit

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_test
          POSTGRES_DB: logitrans_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres_test
      DB_DATABASE: logitrans_test
      DB_LOGGING: 'false'
      DB_AUTO_SEED: 'true'
      DB_RESET_ON_BOOT: 'false'
      NODE_ENV: test
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_SERVER }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run integration tests
        working-directory: server
        run: npm run test:integration
