name: Validate source branch

on:
  pull_request:
    branches: [production]

jobs:
  check-source:
    name: "Only allow merges from main"
    runs-on: ubuntu-latest
    steps:
      - name: Reject PR if source is not main
        if: github.head_ref != 'main'
        run: |
          echo "❌ PRs to production must come from main (got: ${{ github.head_ref }})"
          exit 1

      - name: Confirm source branch
        run: echo "✅ Source branch is main — merge allowed"
